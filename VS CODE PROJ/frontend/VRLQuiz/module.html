<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Module — Staff Assessment Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="module.css"/>
</head>
<body>
  <header class="topbar">
    <a class="topbar-brand" href="../navigation/navigation.html">
      <div class="brand-icon"><i class="bi bi-clipboard2-pulse"></i></div>
      <span class="brand-name">Staff Assessment Portal</span>
    </a>
    <nav class="topbar-nav">
      <a href="../navigation/navigation.html">All Projects</a>
      <a href="#" id="myQuizzesLink" class="active">My Quizzes</a>
      <a href="#" style="pointer-events:none;opacity:.5;">Results</a>
    </nav>
    <div class="topbar-right"><div class="avatar">SD</div></div>
  </header>

  <div class="breadcrumb-bar">
    <a href="../navigation/navigation.html">All Projects</a>
    <i class="bi bi-chevron-right"></i>
    <a href="#" id="bcProject">Project</a>
    <i class="bi bi-chevron-right"></i>
    <span id="bcMod">Module</span>
  </div>

  <div class="page-header">
    <div style="flex:1;">
      <div class="mod-label" id="modLabel">Module</div>
      <h4 id="modTitle">Loading...</h4>
    </div>
    <a href="#" id="allModulesBtn" class="btn-nav"><i class="bi bi-grid-3x3-gap"></i> All Modules</a>
    <button class="btn-nav" id="prevBtn"><i class="bi bi-arrow-left"></i> Previous</button>
    <button class="btn-nav primary" id="nextBtn">Next <i class="bi bi-arrow-right"></i></button>
  </div>

  <div class="main" id="mainContent">
    <div class="content-card" style="text-align:center;padding:3rem;color:var(--text-muted);">
      <i class="bi bi-hourglass-split" style="font-size:2rem;margin-bottom:0.75rem;display:block;"></i>
      Loading module...
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="../quizzes_test/m3.mcq1.js"></script>
  <script src="../quizzes_test/m3.mcq2.js"></script>
  <script src="../quizzes_test/m3.mcq3.js"></script>
  <script src="../quizzes_test/m4.mcq.js"></script>
  <script src="../quizzes_test/m4.sbq.js"></script>

  <script>
    (function() {
      var id = new URLSearchParams(window.location.search).get("id") || "";

      var projectFile, projectLabel, quizJs;
      if (id.startsWith("tsmnt_")) {
        projectFile = "TSMNT.html"; projectLabel = "TSMNT"; quizJs = "tsmnt.js";
      } else if (id.startsWith("ncse_")) {
        projectFile = "NCSE.html"; projectLabel = "NCSE"; quizJs = "ncse.js";
      } else if (id.startsWith("mc_")) {
        projectFile = "Mediacorp.html"; projectLabel = "Mediacorp"; quizJs = "mediacorp.js";
      } else {
        projectFile = "VRLQuiz.html"; projectLabel = "LTA-VRL"; quizJs = "VRLQuiz.js";
      }

      document.getElementById("bcProject").textContent = projectLabel;
      document.getElementById("bcProject").href        = projectFile;
      document.getElementById("myQuizzesLink").href    = projectFile;
      document.getElementById("allModulesBtn").href    = projectFile;

      document.write('<script src="' + quizJs + '"><\/script>');
    })();
  </script>

  <script src="module.js"></script>
</body>
</html>
