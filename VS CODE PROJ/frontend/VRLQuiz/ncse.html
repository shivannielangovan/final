<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NCSE — Staff Assessment Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --navy: #0d1b2a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --surface: #ffffff;
      --bg: #f1f4f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-faint: #94a3b8;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --radius: 12px;
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      background: var(--navy);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: white;
    }

    .brand-name {
      font-size: 0.92rem; font-weight: 700; color: #fff; letter-spacing: 0.2px;
    }

    .topbar-nav { display: flex; align-items: center; gap: 0.25rem; flex: 1; }

    .topbar-nav a {
      color: #94a3b8; text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      padding: 0.4rem 0.75rem; border-radius: 6px;
      transition: all 0.15s;
    }
    .topbar-nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .topbar-nav a.active { color: #fff; background: rgba(255,255,255,0.1); }

    .topbar-right {
      display: flex; align-items: center; gap: 0.75rem; margin-left: auto;
    }

    .avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff;
      cursor: pointer; letter-spacing: 0.5px;
    }

    .breadcrumb-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .breadcrumb-bar a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .breadcrumb-bar a:hover { text-decoration: underline; }
    .breadcrumb-bar i { font-size: 10px; color: var(--text-faint); }

    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
    }

    .page-header-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .project-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #eff6ff; color: var(--accent);
      font-size: 0.72rem; font-weight: 700;
      padding: 0.25em 0.65em; border-radius: 5px;
      letter-spacing: 0.3px;
    }

    .page-header h4 {
      font-size: 1.2rem; font-weight: 700; color: var(--text);
    }

    .page-header-sub {
      font-size: 0.845rem; color: var(--text-muted); margin-top: 2px;
    }

    .progress-section { margin-top: 0.85rem; }

    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .progress-meta strong { color: var(--text); }

    .progress-track {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      border-radius: 999px;
      transition: width 0.6s ease;
      width: 0%;
    }

    .main { padding: 1.5rem 2rem; }

    .section-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-faint);
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 0.85rem;
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width: 1200px) { .modules-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 860px)  { .modules-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px)  { .modules-grid { grid-template-columns: 1fr; } }

    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      position: relative;
      animation: fadeUp 0.4s ease both;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .module-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: #cbd5e1;
      color: inherit;
      text-decoration: none;
    }

    .module-card.locked {
      cursor: not-allowed;
      opacity: 0.55;
      pointer-events: none;
    }

    .module-card.completed {
      border-color: var(--green-border);
      background: linear-gradient(to bottom right, #fff, #f0fdf4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .module-card:nth-child(1) { animation-delay: 0.04s; }
    .module-card:nth-child(2) { animation-delay: 0.08s; }
    .module-card:nth-child(3) { animation-delay: 0.12s; }
    .module-card:nth-child(4) { animation-delay: 0.16s; }
    .module-card:nth-child(5) { animation-delay: 0.20s; }
    .module-card:nth-child(6) { animation-delay: 0.24s; }

    .module-num {
      font-size: 0.7rem; font-weight: 700;
      color: var(--text-faint);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .module-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 0.65rem;
    }

    .module-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.7rem; font-weight: 600;
      padding: 0.22em 0.6em; border-radius: 5px;
      margin-bottom: 0.65rem;
    }

    .status-open      { background: #eff6ff; color: var(--accent); }
    .status-completed { background: var(--green-bg); color: var(--green); }
    .status-locked    { background: #f8fafc; color: var(--text-faint); border: 1px solid var(--border); }

    .module-thumb {
      width: 100%; height: 60px;
      background: var(--bg);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-faint); font-size: 1.5rem;
      margin-top: 0.1rem;
      position: relative; overflow: hidden;
    }

    .module-thumb::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(37,99,235,0.05));
    }

    .module-card.completed .module-thumb {
      background: var(--green-bg);
      color: var(--green);
    }

    .completed-tick {
      position: absolute;
      top: 8px; right: 8px;
      width: 20px; height: 20px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="topbar-brand" href="../navigation/navigation.html">
      <div class="brand-icon"><i class="bi bi-clipboard2-pulse"></i></div>
      <span class="brand-name">Staff Assessment Portal</span>
    </a>
    <nav class="topbar-nav">
      <a href="../navigation/navigation.html">All Projects</a>
      <a href="#" class="active">My Quizzes</a>
      <a href="#" style="pointer-events:none;opacity:.5;">Results</a>
    </nav>
    <div class="topbar-right">
      <div class="avatar">SD</div>
    </div>
  </header>

  <div class="breadcrumb-bar">
    <a href="../navigation/navigation.html">All Projects</a>
    <i class="bi bi-chevron-right"></i>
    <span>NCSE</span>
  </div>

  <div class="page-header">
    <div class="page-header-top">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <h4>NCSE Agent Onboarding</h4>
          <span class="project-badge"><i class="bi bi-grid-3x3-gap"></i> Service Desk</span>
        </div>
        <div class="page-header-sub">Complete all modules to finish your onboarding assessment</div>
      </div>
      <button class="btn btn-sm ms-auto" onclick="resetProgress()"
        style="font-size:0.8rem;color:var(--text-muted);border:1px solid var(--border);border-radius:7px;background:#fff;padding:0.35rem 0.8rem;font-family:'DM Sans',sans-serif;">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Reset Progress
      </button>
    </div>

    <div class="progress-section">
      <div class="progress-meta">
        <span>Overall Progress — <strong id="progressText">0 of 6 modules completed</strong></span>
        <strong id="progressPct">0%</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="section-label">All Modules</div>
    <div class="modules-grid" id="modulesGrid"></div>
  </div>

  <script>
    const LS_KEY = "NCSE_Agent_Onboarding_Portal_v1";

    const modules = [
      { id: "ncse_m1", title: "Introduction to NCSE",        icon: "bi-info-circle",   page: "module.html?id=ncse_m1" },
      { id: "ncse_m2", title: "Call Recordings & Standards", icon: "bi-telephone",     page: "module.html?id=ncse_m2" },
      { id: "ncse_m3", title: "Email Templates",             icon: "bi-envelope",      page: "module.html?id=ncse_m3" },
      { id: "ncse_m4", title: "Escalation List",             icon: "bi-diagram-2",     page: "module.html?id=ncse_m4" },
      { id: "ncse_m5", title: "Infinity Guide",              icon: "bi-infinity",      page: "module.html?id=ncse_m5" },
      { id: "ncse_m6", title: "Knowledge Articles",          icon: "bi-journal-text",  page: "module.html?id=ncse_m6" },
    ];

    function loadProgress() {
      return JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    }

    function isUnlocked(index, progress) {
      return true;
    }

    function renderGrid() {
      const progress = loadProgress();
      const grid = document.getElementById("modulesGrid");
      grid.innerHTML = "";

      const completedCount = modules.filter(m => progress[m.id]?.completed).length;
      const pct = Math.round((completedCount / modules.length) * 100);

      document.getElementById("progressText").textContent =
        `${completedCount} of ${modules.length} modules completed`;
      document.getElementById("progressPct").textContent = `${pct}%`;
      document.getElementById("progressBar").style.width = `${pct}%`;

      modules.forEach((m, i) => {
        const unlocked  = isUnlocked(i, progress);
        const completed = !!progress[m.id]?.completed;

        const card = document.createElement("a");
        card.className = "module-card" +
          (completed ? " completed" : "") +
          (!unlocked  ? " locked"    : "");

        if (unlocked) {
          card.href = m.page;
        } else {
          card.href = "#";
          card.addEventListener("click", e => e.preventDefault());
        }

        const statusClass = completed ? "status-completed" : unlocked ? "status-open" : "status-locked";
        const statusIcon  = completed ? "bi-check-circle-fill" : unlocked ? "bi-play-circle" : "bi-lock";
        const statusLabel = completed ? "Completed" : unlocked ? "Open" : "Locked";

        card.innerHTML = `
          <div class="module-num">Module ${i + 1}</div>
          <div class="module-title">${m.title}</div>
          <span class="module-status ${statusClass}">
            <i class="bi ${statusIcon}"></i>${statusLabel}
          </span>
          <div class="module-thumb">
            <i class="bi ${m.icon}"></i>
            ${completed ? '<div class="completed-tick"><i class="bi bi-check"></i></div>' : ""}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function resetProgress() {
      if (confirm("Reset all module progress? This cannot be undone.")) {
        localStorage.removeItem(LS_KEY);
        renderGrid();
      }
    }

    renderGrid();
  </script>
</body>
</html>
