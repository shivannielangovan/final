<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Assessment Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f8f9fb; display:flex; justify-content:center; align-items:center; height:100vh; }
    .container { text-align:center; background:#fff; padding:60px 80px; border-radius:16px; border:1px solid #e5e7eb; }
    h1 { font-size:24px; color:#1a1d27; margin-bottom:8px; }
    p { color:#888; margin-bottom:40px; font-size:14px; }
    .cards { display:flex; gap:24px; justify-content:center; }
    .card { padding:32px 40px; border:1px solid #e5e7eb; border-radius:12px; cursor:pointer; transition:all 0.2s; text-decoration:none; color:#1a1d27; display:block; }
    .card:hover { border-color:#4f46e5; background:#eef2ff; }
    .icon { font-size:36px; margin-bottom:12px; }
    .card h2 { font-size:16px; font-weight:600; margin-bottom:4px; }
    .card p { font-size:12px; color:#888; margin:0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Staff Assessment Portal</h1>
    <p>Select your role to continue</p>
    <div class="cards">
      <a class="card" href="navigation/navigation.html">
        <div class="icon">🎯</div>
        <h2>Agent</h2>
        <p>Access quizzes & view your scores</p>
      </a>
      <a class="card" href="leaderboard.html">
        <div class="icon">📊</div>
        <h2>Project Lead</h2>
        <p>View agent scoreboard</p>
      </a>
    </div>
  </div>
</body>
</html>
