<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Assessment Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      background: white;
      padding: 60px 80px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    h1 { font-size: 28px; color: #1a202c; margin-bottom: 8px; }
    p { color: #718096; margin-bottom: 40px; font-size: 15px; }
    .cards { display: flex; gap: 24px; justify-content: center; }
    .card {
      padding: 32px 40px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #1a202c;
    }
    .card:hover { border-color: #4f46e5; background: #eef2ff; }
    .card .icon { font-size: 40px; margin-bottom: 12px; }
    .card h2 { font-size: 18px; margin-bottom: 4px; }
    .card p { font-size: 13px; color: #718096; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Staff Assessment Portal</h1>
    <p>Select your role to continue</p>
    <div class="cards">
      <a class="card" href="navigation/navigation.html">
        <div class="icon">🎯</div>
        <h2>Agent</h2>
        <p>Access quizzes & view your scores</p>
      </a>
      <a class="card" href="leaderboard.html">
        <div class="icon">📊</div>
        <h2>Project Lead</h2>
        <p>View agent scoreboard</p>
      </a>
    </div>
  </div>
</body>
</html>
